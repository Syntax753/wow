syntax = "proto3";

package input;

service InputService {
  rpc ProcessInput (ProcessInputRequest) returns (ProcessInputResponse) {}
}

message TraceInfo {
  string trace_id = 1;
  string span_id = 2;
  int64 time_start = 3;
  int64 time_end = 4;
  string service_name = 5;
  string data = 6;
  string data_ret = 7;
  repeated TraceInfo sub_spans = 8;
}

message ProcessInputRequest {
  string key = 1;
  int32 player_x = 2;
  int32 player_y = 3;
  string tiles_json = 4;
  TraceInfo trace = 5;
}

message ProcessInputResponse {
  int32 new_x = 1;
  int32 new_y = 2;
  string action = 3;       // "move", "open_door", "blocked", "wait", "none"
  string message = 4;       // e.g. "Ouch!", "", "You push the door open..."
  int32 door_x = 5;         // if action=open_door, the door coordinates
  int32 door_y = 6;
  bool position_changed = 7;
  TraceInfo trace = 8;
}
