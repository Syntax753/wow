syntax = "proto3";

package room;

service RoomService {
  rpc GenerateRoom (GenerateRoomRequest) returns (GenerateRoomResponse) {}
  rpc GenerateCorridor (GenerateCorridorRequest) returns (GenerateCorridorResponse) {}
}

message TraceInfo {
  string trace_id = 1;
  string span_id = 2;
  int64 time_start = 3;
  int64 time_end = 4;
  string service_name = 5;
  string data = 6;
  string data_ret = 7;
  repeated TraceInfo sub_spans = 8;
}

message LocalPosition {
  int32 x = 1;
  int32 y = 2;
}

message GenerateRoomRequest {
  int32 level = 1;
  TraceInfo trace = 2;
}

message GenerateRoomResponse {
  int32 width = 1;
  int32 height = 2;
  string description = 3;
  repeated LocalPosition doors = 4;
  TraceInfo trace = 5;
  string tiles_json = 6;
}

message GenerateCorridorRequest {
  int32 level = 1;
  TraceInfo trace = 2;
}

message GenerateCorridorResponse {
  int32 length = 1;
  string direction = 2;
  string description = 3;
  TraceInfo trace = 4;
  string tiles_json = 5;
}
