syntax = "proto3";

package dnd;

import "room.proto";

service DndService {
  rpc ExploreDoor (ExploreDoorRequest) returns (ExploreDoorResponse) {}
  rpc ComputeMapModifiers (ComputeMapModifiersRequest) returns (ComputeMapModifiersResponse) {}
}

message TraceInfo {
  string trace_id = 1;
  string span_id = 2;
  int64 time_start = 3;
  int64 time_end = 4;
  string service_name = 5;
  string data = 6;
  string data_ret = 7;
  repeated TraceInfo sub_spans = 8;
}

message MapLayer {
  int32 layer_type = 1;
  string tiles_json = 2;
}

message ComputeMapModifiersRequest {
  int32 player_x = 2;
  int32 player_y = 3;
  int32 visual_range = 4;
  string current_enemies_json = 5;
  TraceInfo trace = 7;
}

message ComputeMapModifiersResponse {
  string merged_tiles_json = 1;
  string new_collision_tiles = 2;
  int32 new_player_x = 3;
  int32 new_player_y = 4;
  string new_rooms_json = 5;
  string updated_enemies_json = 6;
  TraceInfo trace = 7;
}

message ExploreDoorRequest {
  int32 level = 1;
  TraceInfo trace = 2;
  int32 anchor_x = 6;
  int32 anchor_y = 7;
  int32 player_x = 8;
  int32 player_y = 9;
  int32 visual_range = 10;
  string current_enemies_json = 11;
}

message ExploreDoorResponse {
  string structure_type = 1;
  int32 width = 2;
  int32 height = 3;
  string description = 4;
  repeated room.LocalPosition doors = 5;
  TraceInfo trace = 6;
  bool fit_success = 7;
  int32 origin_x = 8;
  int32 origin_y = 9;
  string new_tiles_json = 10;
  string merged_tiles_json = 11;
  string updated_enemies_json = 12;
  string new_rooms_json = 13;
}
