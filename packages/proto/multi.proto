syntax = "proto3";

package multi;

service MultiService {
  rpc JoinSession (JoinSessionRequest) returns (JoinSessionResponse) {}
  rpc LeaveSession (LeaveSessionRequest) returns (LeaveSessionResponse) {}
  rpc ProcessMultiInput (ProcessMultiInputRequest) returns (ProcessMultiInputResponse) {}
  rpc SyncMultiPlayer (SyncMultiPlayerRequest) returns (SyncMultiPlayerResponse) {}
  rpc GetSessionInfo (GetSessionInfoRequest) returns (GetSessionInfoResponse) {}
}

message TraceInfo {
  string trace_id = 1;
  string span_id = 2;
  int64 time_start = 3;
  int64 time_end = 4;
  string service_name = 5;
  string data = 6;
  string data_ret = 7;
  repeated TraceInfo sub_spans = 8;
}

// ── JoinSession ─────────────────────────────────────────────────────
message JoinSessionRequest {
  string player_id = 1;
  string name = 2;
  string hero_class = 3;
  string campaign_id = 4;
  TraceInfo trace = 5;
}

message JoinSessionResponse {
  bool success = 1;
  string color = 2;
  int32 spawn_x = 3;
  int32 spawn_y = 4;
  string level_name = 5;
  int32 active_players = 6;
  TraceInfo trace = 7;
}

// ── LeaveSession ────────────────────────────────────────────────────
message LeaveSessionRequest {
  string player_id = 1;
  TraceInfo trace = 2;
}

message LeaveSessionResponse {
  bool success = 1;
  int32 active_players = 2;
  TraceInfo trace = 3;
}

// ── ProcessMultiInput ───────────────────────────────────────────────
message ProcessMultiInputRequest {
  string player_id = 1;
  string key = 2;
  int32 visual_range = 3;
  string current_enemies_json = 4;
  int32 level = 5;
  TraceInfo trace = 6;
}

message ProcessMultiInputResponse {
  string merged_tiles_json = 1;
  string updated_enemies_json = 2;
  string new_collision_tiles = 3;
  string new_rooms_json = 4;
  int32 player_x = 5;
  int32 player_y = 6;
  string message = 7;
  string action = 8;
  TraceInfo trace = 9;
}

// ── SyncMultiPlayer ─────────────────────────────────────────────────
message SyncMultiPlayerRequest {
  string player_id = 1;
  int32 player_x = 2;
  int32 player_y = 3;
  int32 visual_range = 4;
  string current_enemies_json = 5;
  TraceInfo trace = 6;
}

message SyncMultiPlayerResponse {
  string merged_tiles_json = 1;
  string new_collision_tiles = 2;
  int32 new_player_x = 3;
  int32 new_player_y = 4;
  string new_rooms_json = 5;
  string updated_enemies_json = 6;
  TraceInfo trace = 7;
}

// ── GetSessionInfo ──────────────────────────────────────────────────
message GetSessionInfoRequest {
  TraceInfo trace = 1;
}

message GetSessionInfoResponse {
  int32 active_players = 1;
  bool world_exists = 2;
  string level_name = 3;
  string players_json = 4;
  TraceInfo trace = 5;
}
