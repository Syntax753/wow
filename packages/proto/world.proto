syntax = "proto3";

package world;

service WorldService {
  rpc PlaceStructure (PlaceStructureRequest) returns (PlaceStructureResponse) {}
  rpc GetWorldState (GetWorldStateRequest) returns (GetWorldStateResponse) {}
  rpc InitWorld (InitWorldRequest) returns (InitWorldResponse) {}
  rpc ResetWorld (ResetWorldRequest) returns (ResetWorldResponse) {}
  rpc RevealTiles (RevealTilesRequest) returns (RevealTilesResponse) {}
  rpc SetTile (SetTileRequest) returns (SetTileResponse) {}
}

message TraceInfo {
  string trace_id = 1;
  string span_id = 2;
  int64 time_start = 3;
  int64 time_end = 4;
  string service_name = 5;
  string data = 6;
  string data_ret = 7;
  repeated TraceInfo sub_spans = 8;
}

message LocalPosition {
  int32 x = 1;
  int32 y = 2;
}

message PlaceStructureRequest {
  string structure_type = 1;
  int32 width = 2;
  int32 height = 3;
  string description = 4;
  string tiles_json = 5;
  repeated LocalPosition doors = 6;
  int32 anchor_x = 7;
  int32 anchor_y = 8;
  string direction = 9;
  TraceInfo trace = 10;
}

message PlaceStructureResponse {
  bool fit_success = 1;
  int32 origin_x = 2;
  int32 origin_y = 3;
  string tiles_json = 4;
  string rooms_json = 5;
  TraceInfo trace = 6;
}

message GetWorldStateRequest {
  TraceInfo trace = 1;
}

message GetWorldStateResponse {
  string tiles_json = 1;
  string rooms_json = 2;
  string revealed_json = 4;
  TraceInfo trace = 3;
}

message RevealTilesRequest {
  string visible_coords_json = 1;
  TraceInfo trace = 2;
}

message RevealTilesResponse {
  string revealed_json = 1;
  TraceInfo trace = 2;
}

message InitWorldRequest {
  int32 width = 1;
  int32 height = 2;
  string description = 3;
  string tiles_json = 4;
  repeated LocalPosition doors = 5;
  TraceInfo trace = 6;
}

message InitWorldResponse {
  string tiles_json = 1;
  string rooms_json = 2;
  int32 player_x = 3;
  int32 player_y = 4;
  TraceInfo trace = 5;
}

message ResetWorldRequest {
  TraceInfo trace = 1;
}

message ResetWorldResponse {
  bool success = 1;
  TraceInfo trace = 2;
}

message SetTileRequest {
  int32 x = 1;
  int32 y = 2;
  string tile_char = 3;
  TraceInfo trace = 4;
}

message SetTileResponse {
  bool success = 1;
  string tiles_json = 2;
  string rooms_json = 3;
  TraceInfo trace = 4;
}
