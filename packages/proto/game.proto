syntax = "proto3";

package game;

service GameService {
  rpc StartGame (StartGameRequest) returns (StartGameResponse) {}
  rpc GetKeymap (GetKeymapRequest) returns (GetKeymapResponse) {}
  rpc GetCampaign (GetCampaignRequest) returns (GetCampaignResponse) {}
  rpc GetGameState (GetGameStateRequest) returns (GetGameStateResponse) {}
  rpc GetSettings (GetSettingsRequest) returns (GetSettingsResponse) {}
  rpc UpdateSettings (UpdateSettingsRequest) returns (UpdateSettingsResponse) {}
}

message TraceInfo {
  string trace_id = 1;
  string span_id = 2;
  int64 time_start = 3;
  int64 time_end = 4;
  string service_name = 5;
  string data = 6;
  string data_ret = 7;
  repeated TraceInfo sub_spans = 8;
}

message StartGameRequest {
  int32 level = 1;
  string campaign_id = 2;
  TraceInfo trace = 3;
  int32 max_players = 4;
}

message StartGameResponse {
  bool success = 1;
  string level_name = 2;
  string level_description = 3;
  int32 current_level = 4;
  TraceInfo trace = 5;
  string spawn_positions_json = 6;
}

message GetKeymapRequest {
  TraceInfo trace = 1;
}

message GetKeymapResponse {
  string keymap_json = 1;
  TraceInfo trace = 2;
}

message GetCampaignRequest {
  string campaign_id = 1;
  TraceInfo trace = 2;
}

message GetCampaignResponse {
  string campaign_json = 1;
  TraceInfo trace = 2;
}

message GetGameStateRequest {
  TraceInfo trace = 1;
}

message GetGameStateResponse {
  string campaign_id = 1;
  int32 current_level = 2;
  string level_name = 3;
  int32 total_levels = 4;
  string settings_json = 5;
  TraceInfo trace = 6;
  string spawn_positions_json = 7;
}

message GetSettingsRequest {
  TraceInfo trace = 1;
}

message GetSettingsResponse {
  string settings_json = 1;
  TraceInfo trace = 2;
}

message UpdateSettingsRequest {
  string settings_json = 1;
  TraceInfo trace = 2;
}

message UpdateSettingsResponse {
  bool success = 1;
  string settings_json = 2;
  TraceInfo trace = 3;
}
